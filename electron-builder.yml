appId: com.akke.lynel-desktop
productName: Lynel Desktop
copyright: Copyright © 2026
directories:
  output: dist
  buildResources: build
files:
  - dist-electron/**/*
  - src/renderer/dist/**/*
  - build/windows/trayicon.ico
  - build/darwin/trayicon.png
  - build/linux/trayicon.png
extraMetadata:
  main: dist-electron/src/main/index.js
icon: build/appicon.png
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
win:
  target:
    - target: nsis
      arch: x64
  icon: build/windows/icon.ico
mac:
  target:
    - target: dmg
      arch: x64
  category: public.app-category.developer-tools
linux:
  target:
    - target: AppImage
      arch: x64
  category: Development
  icon: build/linux/icon.png
artifactName: lynel-desktop-${version}-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
