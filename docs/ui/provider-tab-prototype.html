<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark-pro">
<head>
  <meta charset="UTF-8" />
  <title>模型供应商 - UI 原型</title>
  <style>
    :root, [data-theme="dark-pro"] {
      --bg-primary: #1E1E1E; --bg-panel: #252526; --bg-input: #3C3C3C;
      --accent: #8B5CF6; --accent-deep: #7C3AED; --accent-light: #C4B5FD;
      --text-primary: #CCCCCC; --text-secondary: #A0A0A0; --text-tertiary: #808080;
      --status-success: #4EC9B0; --status-error: #F48771; --border: #454545;
      --radius-sm: 4px; --radius-md: 6px; --radius-lg: 10px;
      --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --font-mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font-ui); font-size: 13px; background: var(--bg-primary); color: var(--text-primary); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .provider-tab { width: 920px; height: 620px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; overflow: hidden; }
    .provider-list { width: 240px; background: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .list-header { padding: 16px; border-bottom: 1px solid var(--border); font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
    .add-btn { width: 24px; height: 24px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-input); color: var(--text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .add-btn:hover { border-color: var(--accent); color: var(--accent-light); }
    .list { flex: 1; overflow-y: auto; padding: 8px; }
    .provider-item { padding: 10px 12px; border-radius: var(--radius-md); cursor: pointer; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; border: 1px solid transparent; }
    .provider-item:hover { background: var(--bg-input); }
    .provider-item.active { background: rgba(139,92,246,0.12); border-color: var(--accent); }
    .provider-item .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-tertiary); flex-shrink: 0; }
    .provider-item.active .dot { background: var(--status-success); box-shadow: 0 0 6px var(--status-success); }
    .provider-item .info { flex: 1; min-width: 0; }
    .provider-item .name { font-size: 13px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .provider-item.active .name { color: var(--accent-light); font-weight: 600; }
    .provider-item .url { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .provider-item .badge { font-size: 10px; padding: 2px 6px; border-radius: var(--radius-sm); background: var(--accent); color: #fff; font-weight: 600; }
    .provider-form { flex: 1; padding: 24px; display: flex; flex-direction: column; min-width: 0; }
    .form-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .form-header h3 { margin: 0; font-size: 16px; }
    .form-actions-top button { padding: 5px 12px; font-size: 12px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--bg-input); color: var(--text-primary); cursor: pointer; margin-left: 8px; }
    .form-actions-top button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .form-actions-top button.danger { color: var(--status-error); border-color: var(--status-error); }
    .form-group { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 14px; }
    .form-group label { width: 170px; font-size: 12px; color: var(--text-primary); padding-top: 7px; flex-shrink: 0; }
    .form-group label small { display: block; color: var(--text-tertiary); font-size: 11px; margin-top: 2px; }
    .form-group input { flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 7px 10px; color: var(--text-primary); font-size: 12px; font-family: inherit; }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    .form-group input[type="password"] { font-family: var(--font-mono); }
    .hint { margin-top: auto; padding: 10px 14px; background: rgba(124,58,237,0.08); border: 1px solid var(--accent); border-radius: var(--radius-md); font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .bottom-actions { display: flex; align-items: center; gap: 8px; margin-top: 16px; }
    .bottom-actions .spacer { flex: 1; }
    .bottom-actions button { padding: 7px 16px; border-radius: var(--radius-md); font-size: 12px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text-primary); cursor: pointer; }
    .bottom-actions button.save { background: var(--accent); border-color: var(--accent); color: #fff; }
    .bottom-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="provider-tab">
    <aside class="provider-list">
      <div class="list-header"><span>模型供应商</span><button class="add-btn">+</button></div>
      <div class="list">
        <div class="provider-item active"><span class="dot"></span><div class="info"><div class="name">Anthropic 官方</div><div class="url">https://api.anthropic.com</div></div><span class="badge">当前</span></div>
        <div class="provider-item"><span class="dot"></span><div class="info"><div class="name">硅基流动</div><div class="url">https://api.siliconflow.cn</div></div></div>
        <div class="provider-item"><span class="dot"></span><div class="info"><div class="name">OpenRouter</div><div class="url">https://openrouter.ai/api</div></div></div>
      </div>
    </aside>
    <section class="provider-form">
      <div class="form-header"><h3>编辑供应商</h3><div class="form-actions-top"><button class="danger">删除</button><button class="primary">设为当前</button></div></div>

      <div class="form-group"><label>名称</label><input value="Anthropic 官方" /></div>
      <div class="form-group"><label>Base URL <small>ANTHROPIC_BASE_URL</small></label><input value="https://api.anthropic.com" /></div>
      <div class="form-group"><label>Auth Token <small>ANTHROPIC_AUTH_TOKEN</small></label><input type="password" value="sk-ant-api03-..." /></div>
      <div class="form-group"><label>默认模型 <small>ANTHROPIC_MODEL</small></label><input value="claude-sonnet-4-6-20251101" /></div>
      <div class="form-group"><label>Haiku默认模型 <small>ANTHROPIC_DEFAULT_HAIKU_MODEL</small></label><input placeholder="留空则使用默认模型" /></div>
      <div class="form-group"><label>Sonnet默认模型 <small>ANTHROPIC_DEFAULT_SONNET_MODEL</small></label><input placeholder="留空则使用默认模型" /></div>
      <div class="form-group"><label>Opus默认模型 <small>ANTHROPIC_DEFAULT_OPUS_MODEL</small></label><input placeholder="留空则使用默认模型" /></div>
      <div class="form-group"><label>推理模型 <small>ANTHROPIC_REASONING_MODEL</small></label><input value="claude-opus-4-7-20260201" /></div>

      <div class="hint">推理模型用于 thinking / extended thinking 场景，和普通模型分开配置。</div>

      <div class="bottom-actions">
        <button>测试连接</button>
        <div class="spacer"></div>
        <button>取消</button>
        <button class="save">保存</button>
      </div>
    </section>
  </div>
</body>
</html>
