name: Build Electron App

on:
  push:
    branches: [electron, main]
    tags: ['v*']
  pull_request:
    branches: [electron, main]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            arch: ''
            artifact: win
          - os: macos-latest
            target: mac
            arch: '--x64'
            artifact: mac-x64
          - os: macos-15
            target: mac
            arch: '--arm64'
            artifact: mac-arm64
          - os: ubuntu-latest
            target: linux
            arch: ''
            artifact: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd src/renderer && npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend and electron
        run: npm run build

      - name: Build installer
        run: npx electron-builder --${{ matrix.target }} ${{ matrix.arch }} --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lynel-desktop-${{ matrix.artifact }}
          path: dist/

      - name: Read changelog
        if: startsWith(github.ref, 'refs/tags/v')
        id: changelog
        shell: bash
        run: |
          VER='${{ github.ref_name }}'
          CHANGELOG="docs/changelog/${VER#v}.md"
          if [ -f "$CHANGELOG" ]; then
            cat "$CHANGELOG" > /tmp/release-body.md
          else
            echo "No changelog found at $CHANGELOG" > /tmp/release-body.md
          fi

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*arm64*.dmg
            dist/*.AppImage
          body_path: /tmp/release-body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
