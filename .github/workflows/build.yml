name: Build Electron App

on:
  push:
    branches: [electron, main]
    tags: ['v*']
  pull_request:
    branches: [electron, main]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            arch: ''
          - os: macos-latest
            target: mac
            arch: '--x64'
          - os: macos-15
            target: mac-arm64
            arch: '--arm64'
          - os: ubuntu-latest
            target: linux
            arch: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: npm test

      - name: Build frontend and electron
        run: npm run build

      - name: Build installer
        run: npx electron-builder --${{ matrix.target }} ${{ matrix.arch }} --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lynel-desktop-${{ matrix.target }}
          path: dist/

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*arm64*.dmg
            dist/*.AppImage
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
